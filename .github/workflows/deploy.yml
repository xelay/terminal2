name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2233
          source: "."
          target: "~/terminal2-deployment"
          rm: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2233
          script: |
            set -e

            # --- Отключаем BuildKit: он лезет в auth.docker.io при каждом build ---
            export DOCKER_BUILDKIT=0
            export COMPOSE_DOCKER_CLI_BUILD=0

            # --- Pre-pull базовых образов через классический docker pull ---
            # (он использует локальный кэш и не падает при flaky сети)
            docker pull node:20-alpine  || true
            docker pull nginx:1.27-alpine || true

            # --- Секреты ---
            mkdir -p ~/terminal2-deployment/apps/backend
            cat > ~/terminal2-deployment/apps/backend/.env << 'ENVEOF'
            ${{ secrets.ENV_FILE }}
            ENVEOF
            echo "TINKOFF_TOKEN=${{ secrets.TINKOFF_TOKEN }}" >> ~/terminal2-deployment/apps/backend/.env

            echo "VITE_API_URL=https://trading.kalakala.ru" > ~/terminal2-deployment/apps/frontend/.env
            echo "VITE_WS_URL=https://trading.kalakala.ru" >> ~/terminal2-deployment/apps/frontend/.env

            # --- Сборка и запуск ---
            cd ~/terminal2-deployment
            docker compose -f infra/docker-compose.yml down
            docker compose -f infra/docker-compose.yml build
            docker compose -f infra/docker-compose.yml up -d

            rm -rf ~/terminal2-deployment/*
